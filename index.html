<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCBP Racer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }
    canvas {
      display: block;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a1a;
      color: #00ff88;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading h1 {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    #loading p {
      color: #8888aa;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>OCBP Racer</h1>
    <p>Loading...</p>
  </div>
  <script type="module" src="/src/main.ts"></script>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var el = document.getElementById('loading');
        if (el) el.classList.add('hidden');
      }, 500);
    });
  </script>
</body>
</html>
